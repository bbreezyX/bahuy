<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Outer scope ring -->
  <circle cx="64" cy="64" r="54" stroke="#C4A265" stroke-width="4" fill="none"/>

  <!-- Cardinal crosshair lines (with gap near center) -->
  <line x1="64" y1="4" x2="64" y2="28" stroke="#C4A265" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="100" x2="64" y2="124" stroke="#C4A265" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="4" y1="64" x2="28" y2="64" stroke="#C4A265" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="64" x2="124" y2="64" stroke="#C4A265" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Small tick marks at 45° diagonals -->
  <line x1="22" y1="22" x2="30" y2="30" stroke="#C4A265" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="98" y1="98" x2="106" y2="106" stroke="#C4A265" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="106" y1="22" x2="98" y2="30" stroke="#C4A265" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="22" y1="106" x2="30" y2="98" stroke="#C4A265" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Inner ring -->
  <circle cx="64" cy="64" r="32" stroke="#C4A265" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Center "B" — geometric/angular, drawn as path -->
  <path
    d="M50,42 L50,86 L68,86 Q80,86 80,76 Q80,68 72,66 L72,65 Q78,63 78,56 Q78,42 66,42 Z
       M58,49 L66,49 Q70,49 70,55 Q70,60 66,60 L58,60 Z
       M58,66 L68,66 Q72,66 72,73 Q72,80 68,80 L58,80 Z"
    fill="#C4A265"
    fill-rule="evenodd"
  />
